<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b7a75" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="药品速查" />
  <title>药品位置速查</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --ink: #17201e;
      --muted: #65736f;
      --line: #d9ded8;
      --panel: #ffffff;
      --brand: #0a756f;
      --brand-2: #1f6f9d;
      --warm: #a85a13;
      --danger: #b23a48;
      --soft: #eaf5f1;
      --soft-blue: #ebf3fb;
      --soft-warm: #fff1df;
      --soft-red: #fff0f2;
      --shadow: 0 10px 28px rgba(23, 32, 30, .09);
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, #eef5f1 0, #f6f7f4 210px, #f6f7f4 100%);
      color: var(--ink);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 14px 92px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -14px;
      padding: calc(env(safe-area-inset-top) + 12px) 14px 12px;
      background: linear-gradient(180deg, #eef5f1 0%, rgba(246, 247, 244, .96) 100%);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(216, 221, 214, .8);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 9px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--brand);
      font-weight: 700;
      white-space: nowrap;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 50px;
      padding: 6px 8px 6px 12px;
      border: 2px solid rgba(10, 117, 111, .18);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 18px;
    }

    .icon-chip {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--brand);
      font-weight: 900;
    }

    .clear-btn {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 8px;
      background: #edf1ef;
      color: var(--muted);
      font-weight: 800;
    }

    .tabs {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 30;
      width: min(980px, 100%);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
      background: rgba(255, 255, 255, .94);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .tab-btn {
      min-height: 48px;
      padding: 0 2px;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      font-weight: 800;
      font-size: 14px;
    }

    .tab-btn.active {
      color: #fff;
      background: var(--brand);
    }

    .section {
      display: none;
      padding-top: 12px;
    }

    .section.active {
      display: block;
    }

    .quick-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 12px;
      scrollbar-width: none;
    }

    .quick-row::-webkit-scrollbar { display: none; }

    .quick-chip {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 800;
    }

    .quick-chip.hot {
      background: var(--soft-warm);
      border-color: #f2c899;
      color: var(--warm);
    }

    .status-line {
      color: var(--muted);
      font-size: 14px;
      margin: 2px 2px 10px;
    }

    .results {
      display: grid;
      gap: 10px;
    }

    .drug-card, .cabinet-card, .edit-panel, .empty-panel, .advisor-panel, .advice-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .drug-card {
      padding: 12px;
    }

    .drug-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .drug-name {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      background: var(--soft-blue);
      color: var(--brand-2);
    }

    .badge.warn {
      background: var(--soft-warm);
      color: var(--warm);
    }

    .loc-line {
      display: grid;
      gap: 6px;
      margin: 8px 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .loc-line strong {
      color: var(--brand);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .mini-tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 7px;
      border-radius: 8px;
      background: #f0f2ef;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .primary-btn, .secondary-btn, .danger-btn {
      min-height: 42px;
      border-radius: 8px;
      font-weight: 900;
    }

    .primary-btn {
      background: var(--brand);
      color: #fff;
    }

    .secondary-btn {
      background: #edf1ef;
      color: var(--ink);
    }

    .danger-btn {
      background: #f8e7ea;
      color: var(--danger);
    }

    .cabinet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }

    .cabinet-card {
      overflow: hidden;
    }

    .cabinet-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e8ebe7;
    }

    .cabinet-body {
      padding: 11px;
    }

    .cabinet-body h2 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .cabinet-body p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .photo-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0 2px;
      scrollbar-width: none;
    }

    .photo-strip::-webkit-scrollbar { display: none; }

    .photo-thumb-btn {
      flex: 0 0 96px;
      padding: 0;
      border-radius: 8px;
      overflow: hidden;
      background: #e8ebe7;
      border: 2px solid transparent;
    }

    .photo-thumb-btn img {
      width: 100%;
      height: 74px;
      object-fit: cover;
      display: block;
    }

    .photo-thumb-btn span {
      display: block;
      padding: 4px 3px 6px;
      font-weight: 900;
      color: var(--ink);
      background: #fff;
    }

    .edit-panel {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 9px 10px;
      color: var(--ink);
      background: #fff;
      outline-color: rgba(11, 122, 117, .35);
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .advisor-panel {
      padding: 12px;
      margin-bottom: 12px;
      border-color: rgba(31, 111, 157, .18);
    }

    .advisor-input {
      min-height: 110px;
      font-size: 17px;
      line-height: 1.45;
    }

    .advisor-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 10px;
    }

    .safety-note {
      margin: 10px 0 0;
      padding: 9px 10px;
      border-radius: 8px;
      background: var(--soft-blue);
      color: #28536b;
      line-height: 1.45;
      font-size: 14px;
      font-weight: 700;
    }

    .advice-list {
      display: grid;
      gap: 10px;
    }

    .advice-card {
      padding: 12px;
    }

    .advice-card.alert {
      border-color: #efb0b9;
      background: var(--soft-red);
    }

    .advice-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .advice-title h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
    }

    .advice-body {
      display: grid;
      gap: 8px;
      color: var(--ink);
      line-height: 1.45;
    }

    .candidate-list {
      display: grid;
      gap: 7px;
    }

    .candidate {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }

    .candidate strong {
      display: block;
      font-size: 16px;
      margin-bottom: 2px;
    }

    .candidate small {
      color: var(--muted);
      line-height: 1.35;
    }

    .tiny-btn {
      min-height: 34px;
      padding: 0 9px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--brand);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .photo-fix-note {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--brand);
      line-height: 1.45;
      font-weight: 800;
    }

    .empty-panel {
      padding: 18px 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    dialog {
      width: min(960px, calc(100vw - 18px));
      height: min(92vh, 900px);
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: #111;
      color: #fff;
      box-shadow: 0 18px 60px rgba(0, 0, 0, .4);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, .68);
    }

    .photo-modal {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      background: #111;
    }

    .modal-title {
      min-width: 0;
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .modal-close {
      min-width: 68px;
      min-height: 38px;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font-weight: 900;
    }

    .modal-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: #111;
      text-align: center;
    }

    .modal-scroll img {
      width: 100%;
      height: auto;
      max-width: none;
      display: block;
      margin: 0 auto;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 70px);
      z-index: 60;
      transform: translateX(-50%);
      max-width: min(420px, calc(100vw - 32px));
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(22, 33, 31, .94);
      color: #fff;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .toast.show { opacity: 1; }

    @media (min-width: 720px) {
      .results { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .drug-card.featured { grid-column: span 2; }
      .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      label.full { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="title-row">
        <h1>药品位置速查</h1>
        <span class="count-pill" id="drugCount">0 个药</span>
      </div>
      <div class="search-box">
        <span class="icon-chip">查</span>
        <input id="searchInput" type="search" inputmode="search" autocomplete="off" placeholder="输入药名、首字母、症状" />
        <button class="clear-btn" id="clearSearch" type="button">清空</button>
      </div>
    </header>

    <section class="section active" id="view-search">
      <div class="quick-row" id="quickRow"></div>
      <div class="status-line" id="resultStatus"></div>
      <div class="results" id="results"></div>
    </section>

    <section class="section" id="view-advisor">
      <div class="advisor-panel">
        <label>描述症状或疾病
          <textarea class="advisor-input" id="symptomInput" placeholder="例如：发烧头痛、嗓子疼、胃酸胃痛、腹泻、皮肤过敏、晕车"></textarea>
        </label>
        <div class="advisor-actions">
          <button class="primary-btn" id="askAdvisor" type="button">生成建议</button>
          <button class="secondary-btn" id="clearAdvisor" type="button">清空</button>
        </div>
        <div class="quick-row" id="symptomQuickRow"></div>
        <p class="safety-note">仅供药师辅助判断；孕妇、儿童、老人、基础病、症状严重或持续加重，先问医生。</p>
      </div>
      <div class="advice-list" id="adviceList"></div>
    </section>

    <section class="section" id="view-cabinets">
      <div class="photo-fix-note">已回正照片：P03、P10、P11、P12、P13、P14、P15、P16、P17、P18、P19、P20。</div>
      <div class="cabinet-grid" id="cabinetGrid"></div>
    </section>

    <section class="section" id="view-favorites">
      <div class="status-line" id="favoriteStatus"></div>
      <div class="results" id="favorites"></div>
    </section>

    <section class="section" id="view-edit">
      <div class="edit-panel">
        <form id="drugForm" class="form-grid">
          <input id="editingId" type="hidden" />
          <label>药名
            <input id="formName" required placeholder="例如：小柴胡颗粒" />
          </label>
          <label>别名/拼音
            <input id="formAliases" placeholder="例如：xch, xiaochaihu, 感冒" />
          </label>
          <label>药柜
            <select id="formCabinet"></select>
          </label>
          <label>类别
            <input id="formCategory" placeholder="例如：感冒发热" />
          </label>
          <label>层数
            <input id="formShelf" placeholder="例如：第 3 层" />
          </label>
          <label>左右位置
            <input id="formSide" placeholder="例如：中间偏右" />
          </label>
          <label>照片编号
            <input id="formPhotos" placeholder="例如：p01,p09" />
          </label>
          <label class="full">备注
            <textarea id="formNote" placeholder="例如：蓝色会员条后面，旁边是四季感冒片"></textarea>
          </label>
        </form>
        <div class="form-actions">
          <button class="primary-btn" id="saveDrug" type="button">保存</button>
          <button class="secondary-btn" id="resetForm" type="button">清空表单</button>
          <button class="secondary-btn" id="exportData" type="button">导出</button>
          <button class="danger-btn" id="clearCustom" type="button">清除新增</button>
        </div>
      </div>
    </section>
  </main>

  <nav class="tabs" aria-label="主导航">
    <button class="tab-btn active" data-tab="search" type="button">搜索</button>
    <button class="tab-btn" data-tab="advisor" type="button">问症</button>
    <button class="tab-btn" data-tab="cabinets" type="button">药柜</button>
    <button class="tab-btn" data-tab="favorites" type="button">常用</button>
    <button class="tab-btn" data-tab="edit" type="button">录入</button>
  </nav>

  <dialog id="photoDialog">
    <div class="photo-modal">
      <div class="modal-bar">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" id="closeModal" type="button">关闭</button>
      </div>
      <div class="modal-scroll">
        <img id="modalImage" alt="" />
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
    const PHOTO_ASSETS = {
      p01: { id: "P01", thumb: "assets/photos/p01-thumb.jpg", full: "assets/photos/p01-full.jpg", note: "感冒止痛柜，正面近照" },
      p02: { id: "P02", thumb: "assets/photos/p02-thumb.jpg", full: "assets/photos/p02-full.jpg", note: "退热止痛药，正面近照" },
      p03: { id: "P03", thumb: "assets/photos/p03-thumb.jpg", full: "assets/photos/p03-full.jpg", note: "感冒/过敏/中成药侧面" },
      p04: { id: "P04", thumb: "assets/photos/p04-thumb.jpg", full: "assets/photos/p04-full.jpg", note: "医保支付中成药柜" },
      p05: { id: "P05", thumb: "assets/photos/p05-thumb.jpg", full: "assets/photos/p05-full.jpg", note: "其它用药左半柜" },
      p06: { id: "P06", thumb: "assets/photos/p06-thumb.jpg", full: "assets/photos/p06-full.jpg", note: "抗过敏/晕车/补益药近照" },
      p07: { id: "P07", thumb: "assets/photos/p07-thumb.jpg", full: "assets/photos/p07-full.jpg", note: "其它用药整柜" },
      p08: { id: "P08", thumb: "assets/photos/p08-thumb.jpg", full: "assets/photos/p08-full.jpg", note: "医保支付中成药柜，竖图" },
      p09: { id: "P09", thumb: "assets/photos/p09-thumb.jpg", full: "assets/photos/p09-full.jpg", note: "其它用药整柜，正面" },
      p10: { id: "P10", thumb: "assets/photos/p10-thumb.jpg", full: "assets/photos/p10-full.jpg", note: "消化系统用药，上半柜" },
      p11: { id: "P11", thumb: "assets/photos/p11-thumb.jpg", full: "assets/photos/p11-full.jpg", note: "消化系统用药，侧面" },
      p12: { id: "P12", thumb: "assets/photos/p12-thumb.jpg", full: "assets/photos/p12-full.jpg", note: "胃药/消化药侧面" },
      p13: { id: "P13", thumb: "assets/photos/p13-thumb.jpg", full: "assets/photos/p13-full.jpg", note: "其它用药侧面近照" },
      p14: { id: "P14", thumb: "assets/photos/p14-thumb.jpg", full: "assets/photos/p14-full.jpg", note: "P13 重复照片" },
      p15: { id: "P15", thumb: "assets/photos/p15-thumb.jpg", full: "assets/photos/p15-full.jpg", note: "P12 重复照片" },
      p16: { id: "P16", thumb: "assets/photos/p16-thumb.jpg", full: "assets/photos/p16-full.jpg", note: "P11 重复照片" },
      p17: { id: "P17", thumb: "assets/photos/p17-thumb.jpg", full: "assets/photos/p17-full.jpg", note: "消化系统柜远景" },
      p18: { id: "P18", thumb: "assets/photos/p18-thumb.jpg", full: "assets/photos/p18-full.jpg", note: "消化系统柜右侧" },
      p19: { id: "P19", thumb: "assets/photos/p19-thumb.jpg", full: "assets/photos/p19-full.jpg", note: "消化系统柜布局" },
      p20: { id: "P20", thumb: "assets/photos/p20-thumb.jpg", full: "assets/photos/p20-full.jpg", note: "店内整体侧面布局" }
    };

    const ROTATED_PHOTOS = new Set(["p03", "p10", "p11", "p12", "p13", "p14", "p15", "p16", "p17", "p18", "p19", "p20"]);

    const CUSTOM_KEY = "pharmacy-locator-custom-v1";

    const state = {
      query: "",

      drugs: [],
      custom: [],
      favorites: new Set(),

    const $ = (id) => document.getElementById(id);

    function drug(name, cabinet, category, shelf, side, photos, note, aliases = "", uncertain = false) {
      return {
        id: "base-" + slug(name + "-" + cabinet + "-" + shelf + "-" + side + "-" + photos.join("-")),
        name, cabinet, category, shelf, side, photos, note, aliases, uncertain,
        source: "照片识别"
      };
    }

    function slug(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, "-").replace(/^-|-$/g, "");
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/[，,。.\s/()（）【】\[\]_-]+/g, "");
    }

    function initials(value) {
      return Array.from(String(value || "")).map((ch) => PINYIN_INITIALS[ch] || (/[a-z0-9]/i.test(ch) ? ch.toLowerCase() : "")).join("");
    }

    function cabinetById(id) {
      return CABINETS.find((cab) => cab.id === id) || CABINETS[0];
    }

    function loadStored() {
      try { state.custom = JSON.parse(localStorage.getItem(CUSTOM_KEY) || "[]"); } catch { state.custom = []; }
      try { state.favorites = new Set(JSON.parse(localStorage.getItem(FAVORITE_KEY) || "[]")); } catch { state.favorites = new Set(); }
      try { state.recent = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]"); } catch { state.recent = []; }
      state.drugs = [...BASE_DRUGS, ...state.custom];
    }

    function saveStored() {
      localStorage.setItem(CUSTOM_KEY, JSON.stringify(state.custom));
      localStorage.setItem(FAVORITE_KEY, JSON.stringify([...state.favorites]));
      localStorage.setItem(RECENT_KEY, JSON.stringify(state.recent.slice(0, 30)));
    }

    function searchableText(item) {
      const cab = cabinetById(item.cabinet);
      const joined = [item.name, item.aliases, item.category, item.shelf, item.side, item.note, cab.name, cab.desc, initials(item.name)].join(" ");
      return normalize(joined);
    }

    function rank(item, q) {
      if (!q) return 1;
      const name = normalize(item.name);
      const all = searchableText(item);
      if (name === q) return 100;
      if (name.includes(q)) return 80;
      if (normalize(initials(item.name)).includes(q)) return 72;
      if (all.includes(q)) return 50;
      return 0;
    }

    function getMatches() {
      const q = normalize(state.query);
      return state.drugs
        .map((item) => ({ item, score: rank(item, q) }))
        .filter((row) => row.score > 0)
        .sort((a, b) => b.score - a.score || a.item.name.localeCompare(b.item.name, "zh-Hans-CN"))
        .map((row) => row.item);
    }

    function render() {
      $("drugCount").textContent = `${state.drugs.length} 个药`;
      renderQuickTerms();
      renderSymptomQuickTerms();
      renderResults();
      renderCabinets();
      renderFavorites();
      fillCabinetOptions();
    }

    function renderQuickTerms() {
      $("quickRow").innerHTML = QUICK_TERMS.map((term, index) =>
        `<button class="quick-chip ${index < 4 ? "hot" : ""}" type="button" data-quick="${term}">${term}</button>`
      ).join("");
    }

    function renderSymptomQuickTerms() {
      $("symptomQuickRow").innerHTML = SYMPTOM_TERMS.map((term, index) =>
        `<button class="quick-chip ${index < 5 ? "hot" : ""}" type="button" data-symptom="${term}">${term}</button>`
      ).join("");
      if (!$("adviceList").innerHTML) {
        $("adviceList").innerHTML = `<div class="empty-panel">输入症状后，会给出候选药、简短理由和提醒。结果只给药师辅助判断，不替代问诊。</div>`;
      }
    }

    function findDrugByName(name) {
      const normalized = normalize(name);
      return state.drugs.find((item) => normalize(item.name) === normalized) ||
        state.drugs.find((item) => normalize(item.name).includes(normalized));
    }

    function analyzeSymptoms(rawText) {
      const text = normalize(rawText);
      if (!text) {
        $("adviceList").innerHTML = `<div class="empty-panel">先输入症状，例如“发烧头痛”“胃酸胃痛”“皮肤过敏”。</div>`;
        return;
      }

      const redFlags = RED_FLAG_RULES.filter((rule) => rule.words.some((word) => text.includes(normalize(word))));
      const scored = ADVISOR_RULES
        .map((rule) => ({
          rule,
          score: rule.words.reduce((total, word) => total + (text.includes(normalize(word)) ? 1 : 0), 0)
        }))
        .filter((row) => row.score > 0)
        .sort((a, b) => b.score - a.score)
        .map((row) => row.rule);

      const cards = [];
      if (redFlags.length) {
        cards.push(`
          <article class="advice-card alert">
            <div class="advice-title">
              <h2>先人工判断</h2>
              <span class="badge warn">谨慎</span>
            </div>
            <div class="advice-body">
              ${redFlags.map((item) => `<div>${escapeHtml(item.message)}</div>`).join("")}
            </div>
          </article>
        `);
      }

      if (!scored.length) {
        cards.push(`<div class="empty-panel">没有匹配到明确场景。建议先用药名搜索，或让药师补充症状关键词后再判断。</div>`);
      } else {
        cards.push(...scored.slice(0, 3).map(adviceTemplate));
      }

      $("adviceList").innerHTML = cards.join("");
    }

    function adviceTemplate(rule) {
      const candidates = rule.medicines.map((name) => {
        const item = findDrugByName(name);
        const cab = item ? cabinetById(item.cabinet) : null;
        const place = item ? `${cab.name}，${item.shelf}，${item.side}` : "未录入位置";
        return `
          <div class="candidate">
            <div>
              <strong>${escapeHtml(name)}</strong>
              <small>${escapeHtml(place)}</small>
            </div>
            ${item ? `<button class="tiny-btn" type="button" data-find-drug="${escapeAttr(item.name)}">看位置</button>` : `<span class="mini-tag">待录入</span>`}
          </div>
        `;
      }).join("");

      return `
        <article class="advice-card">
          <div class="advice-title">
            <h2>${escapeHtml(rule.title)}</h2>
            <span class="badge">候选</span>
          </div>
          <div class="advice-body">
            <div><strong>理由：</strong>${escapeHtml(rule.reason)}</div>
            <div class="candidate-list">${candidates}</div>
            <div><strong>提醒：</strong>${escapeHtml(rule.caution)}</div>
          </div>
        </article>
      `;
    }

    function renderResults() {
      const matches = getMatches();
      const q = state.query.trim();
      $("resultStatus").textContent = q ? `找到 ${matches.length} 条：${q}` : "常见药品已按照片预录入，可直接搜索。";
      $("results").innerHTML = matches.length
        ? matches.slice(0, 80).map(cardTemplate).join("")
        : `<div class="empty-panel">没有匹配结果。可以切到“药柜”看照片，或在“录入”里新增。</div>`;
    }

      $("cabinetGrid").innerHTML = CABINETS.map((cab) => {

        return `

            <img src="${first.thumb}" alt="${cab.name}" loading="lazy">
            <div class="cabinet-body">
              <h2>${cab.name}</h2>

              <div class="tag-row">

    function renderFavorites() {
      const favItems = state.drugs.filter((d) => state.favorites.has(d.id));
      const recentItems = state.recent.map((id) => state.drugs.find((d) => d.id === id)).filter(Boolean);
      const combined = [...favItems, ...recentItems.filter((item) => !state.favorites.has(item.id))];
      $("favoriteStatus").textContent = combined.length ? `常用和最近打开 ${combined.length} 条` : "点药品卡片上的“常用”后会出现在这里。";

    }

    function cardTemplate(item) {
      const cab = cabinetById(item.cabinet);
      const photos = (item.photos || []).filter((p) => PHOTO_ASSETS[p]);
      const isFav = state.favorites.has(item.id);
      return `
        <article class="drug-card">
          <div class="drug-head">
            <h2 class="drug-name">${escapeHtml(item.name)}</h2>
            <span class="badge ${item.uncertain ? "warn" : ""}">${item.uncertain ? "看图核对" : "照片清晰"}</span>

          </div>
        </article>
      `;
    }

    function photoButton(id) {
      const photo = PHOTO_ASSETS[id];

      return `
        <button class="photo-thumb-btn" type="button" data-open="${id}" data-title="${escapeAttr(photo.id + fixed + " - " + photo.note)}">
          <img src="${photo.thumb}" alt="${photo.id}" loading="lazy">
          <span>${photo.id}${fixed}</span>
        </button>
      `;
    }

    function fillCabinetOptions() {
      const select = $("formCabinet");
      if (select.options.length) return;
      select.innerHTML = CABINETS.map((cab) => `<option value="${cab.id}">${cab.name}</option>`).join("");
    }

    function openPhoto(photoId, title) {
      const photo = PHOTO_ASSETS[photoId];
      if (!photo) return;
      $("modalTitle").textContent = title || `${photo.id} - ${photo.note}`;
      $("modalImage").src = photo.full;
      $("modalImage").alt = title || photo.note;
      $("photoDialog").showModal();
    }

    function toggleFavorite(id) {
      if (state.favorites.has(id)) state.favorites.delete(id);
      else state.favorites.add(id);
      saveStored();
      renderResults();
      renderFavorites();
    }

    function rememberRecent(id) {
      state.recent = [id, ...state.recent.filter((x) => x !== id)].slice(0, 30);
      saveStored();
    }

    function editDrug(id) {
      const item = state.drugs.find((d) => d.id === id);
      if (!item) return;
      switchTab("edit");
      $("editingId").value = item.id.startsWith("custom-") ? item.id : "";
      $("formName").value = item.name || "";
      $("formAliases").value = item.aliases || "";
      $("formCabinet").value = item.cabinet || "A";
      $("formCategory").value = item.category || "";
      $("formShelf").value = item.shelf || "";
      $("formSide").value = item.side || "";
      $("formPhotos").value = (item.photos || []).join(",");
      $("formNote").value = item.note || "";
      if (!item.id.startsWith("custom-")) toast("已复制到表单，保存后会作为新增记录保留。");
    }

    function showCabinetPhotos(id) {
      const item = state.drugs.find((d) => d.id === id);
      if (!item) return;
      const cab = cabinetById(item.cabinet);
      openPhoto(cab.photos[0], `${item.name} - ${cab.name}`);
    }

    function saveForm() {
      const name = $("formName").value.trim();
      if (!name) {
        toast("先填写药名");
        return;
      }
      const existingId = $("editingId").value.trim();
      const item = {
        id: existingId || "custom-" + Date.now(),
        name,
        aliases: $("formAliases").value.trim(),
        cabinet: $("formCabinet").value,
        category: $("formCategory").value.trim() || "自定义",
        shelf: $("formShelf").value.trim() || "待补充层数",
        side: $("formSide").value.trim() || "待补充左右位置",
        photos: $("formPhotos").value.split(",").map((p) => p.trim().toLowerCase()).filter((p) => PHOTO_ASSETS[p]),
        note: $("formNote").value.trim(),
        uncertain: false,
        source: "手动录入"
      };
      const idx = state.custom.findIndex((d) => d.id === item.id);
      if (idx >= 0) state.custom[idx] = item;
      else state.custom.push(item);
      state.drugs = [...BASE_DRUGS, ...state.custom];
      saveStored();
      resetForm();
      render();
      switchTab("search");
      $("searchInput").value = item.name;
      state.query = item.name;
      renderResults();
      toast("已保存");
    }

    function resetForm() {
      $("editingId").value = "";
      $("drugForm").reset();
      $("formCabinet").value = "A";
    }

    function exportCustomData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        custom: state.custom,
        favorites: [...state.favorites]
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "药品位置新增数据.json";
      a.click();
      URL.revokeObjectURL(url);
      toast("已导出");
    }

    function clearCustomData() {
      if (!confirm("清除所有手动新增的药品？")) return;
      state.custom = [];
      state.drugs = [...BASE_DRUGS];
      saveStored();
      render();
      toast("已清除新增");
    }

    function switchTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll(".tab-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tab));
      document.querySelectorAll(".section").forEach((section) => section.classList.remove("active"));
      $(`view-${tab}`).classList.add("active");
      if (tab === "search") $("searchInput").focus({ preventScroll: true });
      if (tab === "advisor") $("symptomInput").focus({ preventScroll: true });
    }

    function toast(message) {
      const node = $("toast");
      node.textContent = message;
      node.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => node.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function bindEvents() {
      $("searchInput").addEventListener("input", (event) => {
        state.query = event.target.value;
        renderResults();
      });
      $("clearSearch").addEventListener("click", () => {
        state.query = "";
        $("searchInput").value = "";
        renderResults();
        $("searchInput").focus();
      });
      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.tab) switchTab(target.dataset.tab);
        if (target.dataset.quick) {
          state.query = target.dataset.quick;
          $("searchInput").value = state.query;
          switchTab("search");
          renderResults();
        }
        if (target.dataset.symptom) {
          $("symptomInput").value = target.dataset.symptom;
          switchTab("advisor");
          analyzeSymptoms(target.dataset.symptom);
        }
        if (target.dataset.findDrug) {
          state.query = target.dataset.findDrug;
          $("searchInput").value = state.query;
          switchTab("search");
          renderResults();
        }
        if (target.dataset.open) {
          const card = target.closest(".drug-card");
          const editId = card?.querySelector("[data-edit]")?.dataset.edit;
          if (editId) rememberRecent(editId);
          openPhoto(target.dataset.open, target.dataset.title);
        }
        if (target.dataset.fav) toggleFavorite(target.dataset.fav);
        if (target.dataset.edit) editDrug(target.dataset.edit);
        if (target.dataset.more) showCabinetPhotos(target.dataset.more);
      });
      $("closeModal").addEventListener("click", () => $("photoDialog").close());
      $("saveDrug").addEventListener("click", saveForm);
      $("resetForm").addEventListener("click", resetForm);
      $("exportData").addEventListener("click", exportCustomData);
      $("clearCustom").addEventListener("click", clearCustomData);
      $("askAdvisor").addEventListener("click", () => analyzeSymptoms($("symptomInput").value));
      $("clearAdvisor").addEventListener("click", () => {
        $("symptomInput").value = "";
        $("adviceList").innerHTML = `<div class="empty-panel">输入症状后，会给出候选药、简短理由和提醒。结果只给药师辅助判断，不替代问诊。</div>`;
        $("symptomInput").focus();
      });
    }

    loadStored();
    bindEvents();
    render();
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
